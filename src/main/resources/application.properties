# ===============================
# APPLICATION
# ===============================
spring.application.name=khathabook-backend
server.port=${PORT:8080}

# ===============================
# DATABASE (MySQL)
# ===============================
# Uses SPRING_DATASOURCE_URL if set (Railway custom var), otherwise builds from MYSQLHOST/MYSQLPORT
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:127.0.0.1}:${MYSQLPORT:3306}/${MYSQLDATABASE:khathabook}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Memory-optimized pool for Railway Free Tier
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=60000
# Don't fail if DB not immediately available
spring.datasource.hikari.initialization-fail-timeout=0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Don't fail startup if DB is unavailable at launch
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ===============================
# EMAIL (OTP + INVOICE)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=khathabook.noreply@gmail.com
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===============================
# GOOGLE OAUTH
# ===============================
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=${GOOGLE_REDIRECT_URL:http://localhost:8080/auth/google/callback}

# ===============================
# MULTIPART (large images)
# ===============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
